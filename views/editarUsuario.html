<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - Admin Panel</title>
    <link rel="stylesheet" href="/public/editarUsuario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body class="admin-body">
    <div class="user-edit-container">
        <header class="user-edit-header">
            <h1 class="gradient-text">Editar Usuário</h1>
            <p>Gerencie as permissões e dados cadastrais</p>
        </header>

        <form action="/edit-user" method="POST" class="modern-user-form">
            <div class="user-profile-card">
                <div class="user-avatar-placeholder">
                    <i class="bi bi-person-circle"></i>
                </div>
                
                <div class="form-group-modern">
                    <label for="name">Nome Completo</label>
                    <div class="input-with-icon">
                        <i class="bi bi-person"></i>
                        <input type="text" id="name" name="name" required placeholder="Digite o nome" class="input-field">
                    </div>
                </div>

                <div class="form-group-modern">
                    <label for="email">Endereço de E-mail</label>
                    <div class="input-with-icon">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" name="email" required placeholder="Digite o e-mail" class="input-field">
                    </div>
                </div>

                <div class="form-group-modern">
                    <label for="password">Nova Senha</label>
                    <div class="input-with-icon">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="Digite a nova senha" class="input-field">
                    </div>
                </div>
            </div>

            <div class="admin-actions-premium">
                <button type="submit" class="btn-update-user">
                    <i class="bi bi-person-check"></i> Atualizar Usuário
                </button>
                <a href="/admin" class="btn-cancel-user">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
