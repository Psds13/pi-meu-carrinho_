<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Item - Supermercado</title>

    <link rel="stylesheet" href="/public/criar.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="form-header">
            <h1>Cadastro de Item</h1>
            <p>Adicione um novo produto ao catálogo</p>
        </div>
        
        <form action="/submit-item" method="POST" enctype="multipart/form-data" class="item-form">

            <!-- BLOCO -->
            <div class="form-section">
                <h2 class="section-title">Informações Básicas</h2>
                
                <div class="form-group">
                    <label for="nome" class="form-label">
                        Nome do Item <span class="required">*</span>
                    </label>
                    <input type="text" id="nome" name="nome" class="form-input" placeholder="Ex: Arroz, Feijão..." required>
                    <div class="input-hint">Digite o nome do produto</div>
                </div>
                
                <div class="form-group">
                    <label for="preco" class="form-label">
                        Preço <span class="required">*</span>
                    </label>

                    <div class="price-input-container">
                        <span class="currency-symbol">R$</span>
                        <input type="number" id="preco" name="preco" class="form-input price-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>

                </div>
            </div>

            <!-- CLASSIFICAÇÃO -->
            <div class="form-section">
                <h2 class="section-title">Classificação</h2>
                
                <div class="form-row">

                    <div class="form-group">
                        <label for="mercado" class="form-label">
                            Mercado <span class="required">*</span>
                        </label>

                        <select id="mercado" name="mercado" class="form-select" required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="mateus">Mateus</option>
                            <option value="assai">Assaí</option>
                            <option value="atacadao">Atacadão</option>
                            <option value="carrefour">Carrefour</option>
                            <option value="extra">Extra</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="categorias" class="form-label">
                            Categoria <span class="required">*</span>
                        </label>

                        <select id="categorias" name="categorias" class="form-select" required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="alimentos">Alimentos</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="higiene">Higiene</option>
                            <option value="frios">Frios</option>
                            <option value="frutas">Frutas</option>
                            <option value="ofertas">Ofertas</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- IMAGEM -->
            <div class="form-section">
                <h2 class="section-title">Imagem do Produto</h2>

                <div class="file-upload-area" id="upload-area">
                    <input type="file" id="foto" name="foto" accept="image/*">
                    <p>Clique ou arraste uma imagem</p>
                    <span>PNG, JPG até 5MB</span>
                </div>

                <div id="file-preview"></div>
            </div>

            <!-- AÇÕES -->
            <div class="form-actions">
                <button type="submit" class="btn-primary">Cadastrar</button>
                <a href="/views/index.html" class="btn-secondary">Voltar</a>
            </div>

        </form>
    </div>

</body>
</html>
